<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flicky — 100% Client-Side PDF Tools</title>
    <!-- GitHub Pages / Subpath URL trailing-slash normalization script -->
    <script>
      (function() {
        var path = window.location.pathname;
        if (path.length > 1 && !path.endsWith('/') && !path.split('/').pop().includes('.')) {
          window.history.replaceState(null, '', path + '/' + window.location.search + window.location.hash);
        }
      })();
    </script>
    <!-- Favicon / Tab Logo -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <!-- Web Manifest for PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#f97316" />
    <!-- PDF-Lib for merging, splitting, watermarking, stamping, signing, forms, etc -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js" crossorigin="anonymous"></script>
    <!-- PDF.js for page rendering and extraction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous"></script>
    <!-- jsPDF for Image to PDF conversion -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
    <!-- JSZip for batch download as ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous"></script>
    <!-- Tesseract.js for offline OCR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.5/tesseract.min.js" crossorigin="anonymous"></script>
  </head>
  <body class="bg-zinc-50 text-zinc-900 selection:bg-zinc-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
